databaseChangeLog:
  - changeSet:
      id: 0005-ticket-watchers
      author: tracetick
      comment: |
        T5 — Tags + watchers backend.
        Adds `ticket_watchers(ticket_id, user_id)` so CUSTOMER role-scoping can include the
        "me IN (ticket_watchers)" branch (Story 39). Many-to-many join backed by an
        @EntityCollection-style table; tag-key validation already lives in `Tag.of` from T4.

        Event payload shapes introduced here (per ADR-0003, kept in lock-step with code):

          TAG_CHANGE
            {
              "key":     <string, the tag key, e.g. "service">,
              "value":   <string, the tag value, e.g. "api">,
              "action":  "added" | "removed"
            }

          WATCHER_CHANGE
            {
              "user_id": <bigint, the user being added/removed as a watcher; null when
                         the affected User has not yet been persisted>,
              "action":  "added" | "removed"
            }
      changes:
        - createTable:
            tableName: ticket_watchers
            columns:
              - column:
                  name: ticket_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ticket_watchers_ticket
                    references: tickets(id)
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ticket_watchers_user
                    references: users(id)
        - addPrimaryKey:
            tableName: ticket_watchers
            columnNames: ticket_id, user_id
            constraintName: pk_ticket_watchers
        - createIndex:
            tableName: ticket_watchers
            indexName: idx_ticket_watchers_user_id
            columns:
              - column:
                  name: user_id
      rollback:
        - dropTable:
            tableName: ticket_watchers