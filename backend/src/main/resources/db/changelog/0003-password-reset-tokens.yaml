databaseChangeLog:
  - changeSet:
      id: 0003-password-reset-tokens
      author: tracetick
      comment: T3 — Password reset. Stores hashes and lifecycle timestamps for one-time reset tokens.
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_reset_tokens_user
                    references: users(id)
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_password_reset_tokens_token_hash
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: invalidated_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - createIndex:
            tableName: password_reset_tokens
            indexName: idx_password_reset_tokens_user_id
            columns:
              - column:
                  name: user_id
      rollback:
        - dropTable:
            tableName: password_reset_tokens
