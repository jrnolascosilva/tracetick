# Dedicated Compose file for the Playwright happy-path E2E suite.
#
# Separate from the developer-facing `docker-compose.yml` so the e2e run does
# not touch the developer's local Postgres data on host port 5432. The e2e
# stack uses:
#   * a different container name (`tracetick-e2e-postgres`) — no clash with
#     the dev `tracetick-postgres` if both are running,
#   * a different host port (`5433`) so the two stacks can coexist,
#   * its own named volume (`tracetick-e2e-postgres-data`) that the e2e
#     Playwright run drops at globalTeardown — see
#     `frontend/e2e/global-teardown.ts`.
#
# The backend's webServer entry in `frontend/playwright.config.ts` overrides
# `SPRING_DATASOURCE_URL` to point at `localhost:5433` for the duration of the
# suite, so the rest of the app config (defaults in application.yml) stays
# untouched.
services:
  postgres:
    image: postgres:16-alpine
    container_name: tracetick-e2e-postgres
    environment:
      POSTGRES_DB: tracetick
      POSTGRES_USER: tracetick
      POSTGRES_PASSWORD: tracetick
    ports:
      - "5433:5432"
    volumes:
      - tracetick-e2e-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracetick -d tracetick"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tracetick-e2e-postgres-data: