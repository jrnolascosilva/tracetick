name: ci

on:
  pull_request:

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tracetick
          POSTGRES_USER: tracetick
          POSTGRES_PASSWORD: tracetick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tracetick -d tracetick"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tracetick
          SPRING_DATASOURCE_USERNAME: tracetick
          SPRING_DATASOURCE_PASSWORD: tracetick
        run: ./gradlew --no-daemon build

  frontend:
    name: Frontend build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build